<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  
  // ✅ Firebase config สำหรับ D.D. Solution
  const firebaseConfig = {
    apiKey: "AIzaSyBDX37AxELa_YqQYRr7tO2YXaeSvmtM5-Y",
    authDomain: "dd-solution-fedaf.firebaseapp.com",
    projectId: "dd-solution-fedaf",
    storageBucket: "dd-solution-fedaf.firebasestorage.app",
    messagingSenderId: "572669685451",
    appId: "1:572669685451:web:545ed3a216190829bdf54e"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  // Sign in anonymously (ไม่ต้องใส่ password ทุกครั้ง) + แจ้ง error ชัดเจน
  signInAnonymously(auth).catch(err => {
    console.error('Auth error:', err);
    // แปล error code เป็นภาษาคน + วิธีแก้
    var fix = '';
    if (err.code === 'auth/configuration-not-found' || err.code === 'auth/operation-not-allowed') {
      fix = '\n\n🔧 วิธีแก้: เปิด Firebase Console → Authentication → Sign-in method → เปิด "Anonymous"';
    } else if (err.code === 'auth/api-key-not-valid' || (err.message && err.message.indexOf('api-key') > -1)) {
      fix = '\n\n🔧 วิธีแก้: API key ถูกจำกัด/ไม่ถูกต้อง → เช็ค Google Cloud Console → Credentials → ปลดล็อก/แก้ referrer';
    } else if (err.code === 'auth/network-request-failed') {
      fix = '\n\n🔧 วิธีแก้: เน็ตมีปัญหา ลองเปลี่ยน WiFi/มือถือ';
    }
    if (window.__showFatalError) {
      window.__showFatalError('เชื่อมต่อ Firebase ไม่ได้', (err.code || '') + '\n' + (err.message || '') + fix);
    } else {
      window.__firebaseError = (err.code || 'auth-error') + ': ' + (err.message || '') + fix;
    }
  });
  
  // Expose Firebase API to window
  window.firebaseDb = db;
  window.firebaseDoc = doc;
  window.firebaseSetDoc = setDoc;
  window.firebaseGetDoc = getDoc;
  window.firebaseDeleteDoc = deleteDoc;
  window.firebaseOnSnapshot = onSnapshot;
  window.firebaseReady = true;
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<!-- 🛡️ Error Catcher — แสดง error บนจอแทนจอขาว (กันงงครั้งหน้า) -->
<script>
  (function() {
    let errorShown = false;
    // 🧹 ล้าง Service Worker + cache ทั้งหมด (แก้ปัญหา SW เก่าเสิร์ฟไฟล์ผิด → จอขาว)
    window.__clearAllCache = async function() {
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (e) {}
      location.href = location.pathname + '?fresh=' + Date.now();
    };
    function showError(title, detail) {
      if (errorShown) return;
      errorShown = true;
      var splash = document.getElementById('splash');
      if (splash) splash.style.display = 'none';
      var box = document.createElement('div');
      box.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:99999;padding:20px;overflow:auto;font-family:system-ui,sans-serif;-webkit-overflow-scrolling:touch';
      box.innerHTML =
        '<div style="max-width:600px;margin:40px auto">' +
        '<div style="font-size:48px;text-align:center">⚠️</div>' +
        '<h2 style="color:#dc2626;text-align:center;margin:8px 0">แอปโหลดไม่สำเร็จ</h2>' +
        '<p style="color:#78716c;text-align:center;font-size:14px">ส่งภาพหน้านี้ให้ผู้ดูแลเพื่อแก้ไข</p>' +
        '<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:12px;padding:14px;margin:16px 0">' +
        '<div style="font-weight:bold;color:#991b1b;margin-bottom:6px">' + title + '</div>' +
        '<pre style="white-space:pre-wrap;word-break:break-word;font-size:12px;color:#7f1d1d;margin:0">' + detail + '</pre>' +
        '</div>' +
        '<div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:12px;padding:14px;font-size:13px;color:#0c4a6e">' +
        '<strong>ลองแก้เบื้องต้น:</strong><br>' +
        '1. กดปุ่มสีเขียวด้านล่าง (ล้างแคช + รีเฟรช)<br>' +
        '2. ถ้ายังไม่ได้ ปิดแอปเปิดใหม่ / เปลี่ยนเน็ต<br>' +
        '3. ถ้ายังไม่ได้ ส่งภาพนี้ให้ผู้ดูแล' +
        '</div>' +
        '<button onclick="window.__clearAllCache()" style="width:100%;background:#10b981;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:bold;margin-top:16px">🧹 ล้างแคช + โหลดใหม่ (แนะนำ)</button>' +
        '<button onclick="location.reload()" style="width:100%;background:#f59e0b;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:bold;margin-top:10px">🔄 โหลดใหม่เฉยๆ</button>' +
        '<button onclick="window.__clearAllCache()" style="width:100%;background:#dc2626;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:bold;margin-top:10px">🧹 ล้างแคชแล้วโหลดใหม่ (แก้จอขาว)</button>' +
        '<div style="text-align:center;font-size:11px;color:#a8a29e;margin-top:12px">เวลา: ' + new Date().toLocaleString('th-TH') + '</div>' +
        '</div>';
      document.body.appendChild(box);
    }

    // จับ error ทุกชนิด
    window.__showFatalError = showError;  // ให้ Firebase module เรียกได้
    window.addEventListener('error', function(e) {
      var msg = e.message || 'Unknown error';
      var src = e.filename ? (e.filename.split('/').pop() + ':' + e.lineno) : '';
      // เฉพาะ error ที่ทำให้แอปพังจริง (ไม่นับ resource โหลดไม่ครบเล็กๆ น้อยๆ)
      if (e.message) showError('JavaScript Error', msg + (src ? '\n📍 ' + src : ''));
    });
    window.addEventListener('unhandledrejection', function(e) {
      var r = e.reason || {};
      showError('Promise Error', (r.message || String(r)) + (r.code ? '\n🔑 code: ' + r.code : ''));
    });

    // เช็คว่า React render สำเร็จไหมใน 8 วินาที (จอขาว = render ไม่ขึ้น)
    window.__appLoaded = false;
    setTimeout(function() {
      var root = document.getElementById('root');
      if (!window.__appLoaded && root && root.children.length === 0) {
        // ถ้ามี Firebase error ค้างอยู่ → แสดงอันนั้นก่อน (ชัดกว่า)
        if (window.__firebaseError) {
          showError('เชื่อมต่อ Firebase ไม่ได้', window.__firebaseError);
          return;
        }
        // ตรวจว่าเครื่องมือโหลดครบไหม
        var missing = [];
        if (typeof React === 'undefined') missing.push('React');
        if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
        if (typeof Babel === 'undefined') missing.push('Babel (ตัวแปลงโค้ด)');
        if (typeof XLSX === 'undefined') missing.push('XLSX (Excel)');
        var detail = missing.length > 0
          ? 'โหลดไลบรารีไม่ครบ: ' + missing.join(', ') + '\n\nมักเกิดจากเน็ตช้า/หลุด หรือ CDN ถูกบล็อก ลองเปิดใหม่หรือเปลี่ยนเน็ต'
          : 'แอปไม่แสดงผลใน 8 วินาที (โค้ดอาจมี error ตอนเริ่มทำงาน) ลองโหลดใหม่';
        showError('แอปไม่แสดงผล (จอขาว)', detail);
      }
    }, 8000);
  })();
</script>

<!-- Firebase Storage Adapter -->
<script>
  // ============== FIREBASE STORAGE ADAPTER ==============
  // ทำให้ window.storage ทำงานเหมือน Anthropic shared storage แต่ใช้ Firebase Firestore
  
  const COLLECTION = 'dd_solution_v1';
  
  window.storage = {
    async get(key, shared = true) {
      if (!window.firebaseReady) {
        await new Promise(resolve => window.addEventListener('firebase-ready', resolve, { once: true }));
      }
      try {
        const docRef = window.firebaseDoc(window.firebaseDb, COLLECTION, key.replace(/:/g, '_'));
        const snap = await window.firebaseGetDoc(docRef);
        if (snap.exists()) {
          return { key, value: snap.data().value, shared };
        }
        return null;
      } catch (e) {
        console.error('Firebase get error:', e);
        // Fallback to localStorage
        const v = localStorage.getItem(`fb_${key}`);
        return v ? { key, value: v, shared } : null;
      }
    },
    
    async set(key, value, shared = true) {
      if (!window.firebaseReady) {
        await new Promise(resolve => window.addEventListener('firebase-ready', resolve, { once: true }));
      }
      try {
        const docRef = window.firebaseDoc(window.firebaseDb, COLLECTION, key.replace(/:/g, '_'));
        await window.firebaseSetDoc(docRef, { value, updatedAt: new Date().toISOString() });
        // Also save to localStorage as backup
        localStorage.setItem(`fb_${key}`, value);
        return { key, value, shared };
      } catch (e) {
        console.error('Firebase set error:', e);
        // Fallback to localStorage only
        localStorage.setItem(`fb_${key}`, value);
        return { key, value, shared };
      }
    },
    
    async delete(key, shared = true) {
      if (!window.firebaseReady) {
        await new Promise(resolve => window.addEventListener('firebase-ready', resolve, { once: true }));
      }
      try {
        const docRef = window.firebaseDoc(window.firebaseDb, COLLECTION, key.replace(/:/g, '_'));
        await window.firebaseDeleteDoc(docRef);
        localStorage.removeItem(`fb_${key}`);
        return { key, deleted: true, shared };
      } catch (e) {
        console.error('Firebase delete error:', e);
        localStorage.removeItem(`fb_${key}`);
        return { key, deleted: true, shared };
      }
    }
  };
  
  // Subscribe to real-time updates from Firebase
  window.subscribeToKey = function(key, callback) {
    if (!window.firebaseReady) {
      window.addEventListener('firebase-ready', () => window.subscribeToKey(key, callback), { once: true });
      return () => {};
    }
    const docRef = window.firebaseDoc(window.firebaseDb, COLLECTION, key.replace(/:/g, '_'));
    return window.firebaseOnSnapshot(docRef, (snap) => {
      if (snap.exists() && snap.data().value) {
        callback(snap.data().value);
      }
    });
  };
</script>

<!-- Service Worker: ปิดถาวร + ปลด SW เก่าทิ้ง (แอปออนไลน์ตลอด ไม่ต้อง cache → กันบั๊กจอขาว) -->
<script>
  if ('serviceWorker' in navigator) {
    // ปลด Service Worker เก่าทุกตัวทิ้ง (ตัว v3 ที่มีบั๊ก fallback ผิด)
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    }).catch(function(){});
    // ล้าง cache เก่าทั้งหมด
    if (window.caches) {
      caches.keys().then(function(keys) {
        keys.forEach(function(k) { caches.delete(k); });
      }).catch(function(){});
    }
  }
</script>

<!-- (เก็บโค้ดเดิมไว้แต่ไม่ทำงาน — เผื่ออยากเปิด SW อีกครั้งในอนาคต) -->
<script>
  if (false && 'serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then((reg) => {
        reg.update();
        setInterval(() => reg.update(), 30 * 60 * 1000);
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateBanner(newWorker);
            }
          });
        });
      }).catch((err) => console.log('SW registration failed:', err));
      
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    });
  }

  // แสดง banner แจ้งให้อัพเดท
  function showUpdateBanner(worker) {
    const banner = document.createElement('div');
    banner.style.cssText = `
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #f59e0b, #ea580c);
      color: white; padding: 14px 20px; border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      z-index: 9999; max-width: 90vw; width: 360px;
      display: flex; align-items: center; gap: 12px;
      font-family: 'Sarabun', sans-serif;
      animation: slideUp 0.3s ease-out;
    `;
    banner.innerHTML = `
      <div style="font-size: 28px;">🎉</div>
      <div style="flex: 1;">
        <div style="font-weight: 700; font-size: 14px;">มีเวอร์ชั่นใหม่!</div>
        <div style="font-size: 12px; opacity: 0.9;">กดอัพเดทเพื่อใช้ฟีเจอร์ใหม่ล่าสุด</div>
      </div>
      <button id="dd-update-btn" style="
        background: white; color: #ea580c; border: none;
        padding: 8px 16px; border-radius: 10px; font-weight: 700;
        cursor: pointer; font-size: 14px; flex-shrink: 0;
      ">อัพเดท</button>
    `;
    document.body.appendChild(banner);
    
    document.getElementById('dd-update-btn').addEventListener('click', () => {
      worker.postMessage('SKIP_WAITING');
      banner.style.opacity = '0.5';
      banner.querySelector('button').textContent = 'กำลังอัพเดท...';
    });
  }
  
  // CSS animation
  const style = document.createElement('style');
  style.textContent = `@keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }`;
  document.head.appendChild(style);
</script>
